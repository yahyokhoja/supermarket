services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: map-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mapdb}
      POSTGRES_USER: ${POSTGRES_USER:-map}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mappass}
    ports:
      - "${POSTGIS_PORT:-5434}:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro

  tegola:
    image: gospatial/tegola:latest
    container_name: map-tegola
    restart: unless-stopped
    depends_on:
      - postgis
    command: ["serve", "--config", "/etc/tegola/config.toml"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mapdb}
      POSTGRES_USER: ${POSTGRES_USER:-map}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mappass}
      POSTGRES_HOST: postgis
      POSTGRES_PORT: 5432
    volumes:
      - ./config/tegola.toml:/etc/tegola/config.toml:ro
    ports:
      - "${TEGOLA_PORT:-8088}:8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: map-nginx
    restart: unless-stopped
    depends_on:
      - tegola
    ports:
      - "${MAP_HTTP_PORT:-8090}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgis_data:
